<!DOCTYPE html>
<html>
<head><title>Button Test</title></head>
<body>
<button onclick="testClick()">Test Button</button>
<div id="result">Not clicked</div>
<script>
function testClick() {
    document.getElementById('result').textContent = 'Button clicked!';
    console.log('testClick was called');
}
</script>
</body>
</html>
