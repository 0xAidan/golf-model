profiles:
  default:
    tour: pga
    enable_ai: true
    enable_backfill: true
    backfill_years: [2024, 2025, 2026]
    output_dir: output

  quick:
    tour: pga
    enable_ai: false
    enable_backfill: false
    output_dir: output

  full:
    tour: pga
    enable_ai: true
    enable_backfill: true
    backfill_years: [2020, 2021, 2022, 2023, 2024, 2025, 2026]
    output_dir: output

  # Parallel lab snapshot lane — Cockpit (Lab) / lab_* snapshot sections (see live_refresh.lab_profile_*).
  # Uses promoted matchup-lab champion (config/lab_matchup_champion_trial327.json), not production strategy.
  # Main dashboard stays on COCKPIT_SNAPSHOT_MODEL_VARIANT (baseline) for A/B vs Lab.
  lab_sandbox:
    tour: pga
    model_variant: v5
    lab_champion_config: config/lab_matchup_champion_trial327.json
    enable_ai: false
    enable_backfill: false
    output_dir: output
