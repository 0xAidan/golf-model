# Feature flags for the golf betting model.
# Toggle features without code deploy. Used by src/feature_flags.py.
# All flags default to false if missing; set to true to enable.

dynamic_blend: true
exposure_caps: true
kelly_sizing: true
kelly_stakes: true
clv_tracking: true
dead_heat_adjustment: true
3ball: true

# Safe defaults for existing behavior
use_confirmed_field_only: true

# Offline shadow Monte Carlo (append-only DB rows); default off.
shadow_monte_carlo_v1: false
shadow_monte_carlo_v2: false

# When dynamic_blend is on, require OOS-style evidence before EWA can *increase*
# model weight vs the prior tournament (see src/dynamic_blend.py).
dynamic_blend_oos_promotion: false
