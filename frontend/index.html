<!doctype html>
<html lang="en">
  <head>
    <script>
      (function () {
        var key = "golf-model.theme";
        var stored = localStorage.getItem(key);
        var theme =
          stored === "light" || stored === "dark" || stored === "system"
            ? stored
            : "system";
        var dark =
          theme === "dark" ||
          (theme === "system" &&
            window.matchMedia("(prefers-color-scheme: dark)").matches);
        document.documentElement.classList.toggle("dark", dark);
        document.documentElement.style.colorScheme = dark ? "dark" : "light";
      })();
    </script>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Golf Model</title>

    <link rel="preload" href="/fonts/zodiak-regular.woff2" as="font" type="font/woff2" crossorigin />
    <link rel="preload" href="/fonts/zodiak-medium.woff2" as="font" type="font/woff2" crossorigin />
    <link rel="preload" href="/fonts/zodiak-bold.woff2" as="font" type="font/woff2" crossorigin />
    <link rel="preload" href="/fonts/switzer-regular.woff2" as="font" type="font/woff2" crossorigin />
    <link rel="preload" href="/fonts/switzer-medium.woff2" as="font" type="font/woff2" crossorigin />
    <link rel="preload" href="/fonts/fragment-mono-regular.woff2" as="font" type="font/woff2" crossorigin />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
