name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - run: pip install -r requirements.txt
      - run: python -m pytest tests/ -v --tb=short

  lint:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install ruff
      - run: ruff check --output-format=github .

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20.19.0"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
        working-directory: frontend
      - run: npm run lint
        working-directory: frontend
      - run: npm run typecheck
        working-directory: frontend
      - run: npm run test
        working-directory: frontend
      - run: npm run build
        working-directory: frontend

  backend-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - name: Start backend for smoke test
        run: |
          export DATAGOLF_API_KEY="smoke-test-placeholder"
          python app.py > smoke-app.log 2>&1 &
          echo $! > smoke-app.pid
      - name: Wait for backend readiness
        run: |
          python - <<'PY'
          import json
          import time
          import urllib.request

          deadline = time.time() + 45
          root_url = "http://127.0.0.1:8000/"
          ops_url = "http://127.0.0.1:8000/api/ops/health"

          def get(url):
            with urllib.request.urlopen(url, timeout=5) as response:
              body = response.read().decode("utf-8")
              return response.status, body

          last_error = None
          while time.time() < deadline:
            try:
              root_status, _ = get(root_url)
              status_code, ops_body = get(ops_url)
              payload = json.loads(ops_body)
              if root_status == 200 and status_code == 200 and payload.get("ok") is True:
                print("Smoke checks passed.")
                raise SystemExit(0)
              last_error = f"unexpected status root={root_status} ops={status_code} ok={payload.get('ok')}"
            except Exception as exc:
              last_error = str(exc)
            time.sleep(2)

          raise SystemExit(f"Backend smoke checks failed: {last_error}")
          PY
      - name: Run local synthetic reliability check
        run: python scripts/reliability_synthetic_check.py --base-url http://127.0.0.1:8000 --smoke-local
      - name: Dump backend log on failure
        if: failure()
        run: python - <<'PY'
          from pathlib import Path
          log_path = Path("smoke-app.log")
          if log_path.exists():
            print(log_path.read_text(encoding="utf-8"))
          else:
            print("smoke-app.log was not created")
          PY
      - name: Stop backend smoke process
        if: always()
        run: |
          if [ -f smoke-app.pid ]; then
            kill "$(cat smoke-app.pid)" || true
          fi

  frontend-bundle-budget:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20.19.0"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
        working-directory: frontend
      - run: npm run build
        working-directory: frontend
      - run: npm run bundle:budget
        working-directory: frontend

  frontend-a11y:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20.19.0"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - run: npm ci
        working-directory: frontend
      - run: npx playwright install chromium --with-deps
        working-directory: frontend
      - run: npm run build
        working-directory: frontend
      - name: Start backend for a11y tests
        run: |
          export DATAGOLF_API_KEY="a11y-test-placeholder"
          python app.py > a11y-app.log 2>&1 &
          echo $! > a11y-app.pid
      - name: Wait for backend
        run: |
          python - <<'PY'
          import time, urllib.request
          url = "http://127.0.0.1:8000/"
          for _ in range(30):
            try:
              with urllib.request.urlopen(url, timeout=3) as r:
                if r.status == 200:
                  print("ready")
                  raise SystemExit(0)
            except Exception:
              time.sleep(2)
          raise SystemExit("backend not ready")
          PY
      - run: npm run test:a11y
        working-directory: frontend
        env:
          PLAYWRIGHT_SKIP_WEBSERVER: "1"
      - name: Stop backend
        if: always()
        run: |
          if [ -f a11y-app.pid ]; then kill "$(cat a11y-app.pid)" || true; fi

  frontend-visual-diff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20.19.0"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - run: npm ci
        working-directory: frontend
      - run: npx playwright install chromium --with-deps
        working-directory: frontend
      - run: npm run build
        working-directory: frontend
      - name: Start backend for screenshots
        run: |
          export DATAGOLF_API_KEY="visual-diff-placeholder"
          python app.py > visual-app.log 2>&1 &
          echo $! > visual-app.pid
      - name: Wait for backend
        run: |
          python - <<'PY'
          import time, urllib.request
          for _ in range(30):
            try:
              with urllib.request.urlopen("http://127.0.0.1:8000/", timeout=3) as r:
                if r.status == 200:
                  raise SystemExit(0)
            except Exception:
              time.sleep(2)
          raise SystemExit("backend not ready")
          PY
      - name: Capture PR screenshot matrix (engine-scale-v1)
        run: |
          mkdir -p docs/screenshots/engine-scale-v1-pr
          SCREENSHOT_MATRIX_VERSION=engine-scale-v1 \
          SCREENSHOT_OUT_DIR=docs/screenshots/engine-scale-v1-pr \
          SCREENSHOT_BASE_URL=http://127.0.0.1:8000 \
          node scripts/capture-screenshot-matrix.mjs
        working-directory: frontend
      - name: Compare to engine-scale-v1 baseline
        # Skips gracefully (exit 0) until docs/screenshots/engine-scale-v1/ holds a
        # committed real-data baseline. See docs/screenshots/engine-scale-v1/README.md.
        run: |
          VISUAL_BASELINE_DIR=docs/screenshots/engine-scale-v1 \
          VISUAL_CANDIDATE_DIR=docs/screenshots/engine-scale-v1-pr \
          npm run visual:diff
        working-directory: frontend
      - name: Stop backend
        if: always()
        run: |
          if [ -f visual-app.pid ]; then kill "$(cat visual-app.pid)" || true; fi
