name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - run: pip install -r requirements.txt
      - run: python -m pytest tests/ -v --tb=short

  lint:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install ruff
      - run: ruff check --output-format=github .

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20.19.0"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
        working-directory: frontend
      - run: npm run lint
        working-directory: frontend
      - run: npm run typecheck
        working-directory: frontend
      - run: npm run test
        working-directory: frontend
      - run: npm run build
        working-directory: frontend

  backend-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - name: Start backend for smoke test
        run: |
          export DATAGOLF_API_KEY="smoke-test-placeholder"
          python app.py > smoke-app.log 2>&1 &
          echo $! > smoke-app.pid
      - name: Wait for backend readiness
        run: |
          python - <<'PY'
          import json
          import time
          import urllib.request

          deadline = time.time() + 45
          root_url = "http://127.0.0.1:8000/"
          status_url = "http://127.0.0.1:8000/api/live-refresh/status"

          def get(url):
            with urllib.request.urlopen(url, timeout=5) as response:
              body = response.read().decode("utf-8")
              return response.status, body

          last_error = None
          while time.time() < deadline:
            try:
              root_status, _ = get(root_url)
              status_code, status_body = get(status_url)
              payload = json.loads(status_body)
              status_payload = payload.get("status") if isinstance(payload.get("status"), dict) else payload
              has_running = isinstance(status_payload, dict) and "running" in status_payload
              if root_status == 200 and status_code == 200 and has_running:
                print("Smoke checks passed.")
                raise SystemExit(0)
              last_error = f"unexpected status root={root_status} api={status_code}"
            except Exception as exc:
              last_error = str(exc)
            time.sleep(2)

          raise SystemExit(f"Backend smoke checks failed: {last_error}")
          PY
      - name: Dump backend log on failure
        if: failure()
        run: python - <<'PY'
          from pathlib import Path
          log_path = Path("smoke-app.log")
          if log_path.exists():
            print(log_path.read_text(encoding="utf-8"))
          else:
            print("smoke-app.log was not created")
          PY
      - name: Stop backend smoke process
        if: always()
        run: |
          if [ -f smoke-app.pid ]; then
            kill "$(cat smoke-app.pid)" || true
          fi
